services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: aitgpt_frontend
    ports:
      - "3000:3000"
    networks:
      aitgpt_network:
        aliases:
          - frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      VITE_API_URL: ${VITE_API_URL}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  aitgpt_network:
    external: true
