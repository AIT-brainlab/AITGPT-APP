services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aitgpt_backend_web
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - LANGFLOW_API_URL=${LANGFLOW_API_URL}
      - LANGFLOW_API_KEY=${LANGFLOW_API_KEY}
      - LANGFLOW_RUN_ID=${LANGFLOW_RUN_ID}
    networks:
      - aitgpt_network
    restart: unless-stopped

networks:
  aitgpt_network:
    external: true
